name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: taskflow_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/taskflow_test
      JWT_ACCESS_SECRET: ci-test-access-secret-at-least-32-chars
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm -w packages/shared run build

      - name: TypeScript check
        run: |
          npx tsc --noEmit -p packages/backend/tsconfig.json
          npx tsc --noEmit -p packages/frontend/tsconfig.json

      - name: Prisma generate
        run: npm -w packages/backend run db:generate

      - name: Prisma migrate
        run: npm -w packages/backend run db:migrate

      - name: Run tests
        run: npm test
